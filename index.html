<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#120f18" />
  <title>Game Codex v5</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar closed">
      <div class="sidebar-head">
        <div>
          <div class="eyebrow">Royal Archive</div>
          <h1>Game Codex</h1>
        </div>
        <button id="closeSidebarBtn" class="icon-btn">✕</button>
      </div>
      <div class="sidebar-section">
        <button class="nav-btn active" data-view="home">🏠 Home</button>
        <button class="nav-btn" data-view="favorites">⭐ Favorites</button>
      </div>
      <div class="sidebar-section">
        <div class="section-label">Categories</div>
        <div id="sidebarCategories" class="sidebar-list"></div>
      </div>
      <div class="sidebar-section">
        <div class="section-label">Tools</div>
        <div class="sidebar-list">
          <button id="exportBtn" class="nav-btn">📦 Export</button>
          <label class="nav-btn file-label">📥 Import<input id="importInput" type="file" accept="application/json" hidden /></label>
          <button id="resetBtn" class="nav-btn danger">🧨 Reset Demo</button>
        </div>
      </div>
    </aside>

    <div id="overlay" class="overlay hidden"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="openSidebarBtn" class="icon-btn">☰</button>
          <div>
            <div class="eyebrow">Profiles + custom fields build</div>
            <h2 id="viewTitle">Game Codex</h2>
          </div>
        </div>
        <div class="topbar-right">
          <input id="searchInput" class="search" type="search" placeholder="Search games, profiles, modules..." />
          <button id="addGameBtn" class="primary-btn">+ Add Game</button>
        </div>
      </header>

      <section id="homeView" class="view"></section>
      <section id="categoryView" class="view hidden"></section>
      <section id="gameView" class="view hidden"></section>
      <section id="profileView" class="view hidden"></section>
      <section id="favoritesView" class="view hidden"></section>
    </main>
  </div>

  <dialog id="gameModal" class="modal">
    <form id="gameForm" class="modal-card">
      <div class="modal-head"><div><div class="eyebrow">Game Setup</div><h3 id="gameModalTitle">Add Game</h3></div><button type="button" class="icon-btn" data-close="gameModal">✕</button></div>
      <input id="gameEditId" type="hidden" />
      <div class="form-grid two">
        <label><span>Game title</span><input id="gameTitleInput" type="text" required /></label>
        <label><span>Status</span><select id="gameStatusInput"><option value="active">Active</option><option value="paused">Paused</option><option value="completed">Completed</option><option value="archived">Archived</option></select></label>
      </div>
      <div class="form-grid two">
        <label><span>Category</span><select id="gameCategoryInput"></select></label>
        <label><span>Banner URL</span><input id="gameBannerInput" type="url" placeholder="optional https://..." /></label>
      </div>
      <div class="form-grid two">
        <label><span>Favorite</span><select id="gameFavoriteInput"><option value="false">No</option><option value="true">Yes</option></select></label>
        <label><span>Optional Steam App ID</span><input id="gameSteamInput" type="text" placeholder="526870" /></label>
      </div>
      <div class="modal-actions"><button type="button" class="secondary-btn" data-close="gameModal">Cancel</button><button type="submit" class="primary-btn">Save Game</button></div>
    </form>
  </dialog>

  <dialog id="profileModal" class="modal">
    <form id="profileForm" class="modal-card">
      <div class="modal-head"><div><div class="eyebrow">Profile</div><h3 id="profileModalTitle">Add Profile</h3></div><button type="button" class="icon-btn" data-close="profileModal">✕</button></div>
      <input id="profileEditId" type="hidden" />
      <input id="profileGameId" type="hidden" />
      <div class="form-grid two">
        <label><span>Name</span><input id="profileNameInput" type="text" required /></label>
        <label><span>Type</span><select id="profileTypeInput"><option value="world">World</option><option value="playthrough">Playthrough</option><option value="save">Save</option><option value="run">Run</option><option value="build">Build</option><option value="custom">Custom</option></select></label>
      </div>
      <div class="form-grid two">
        <label><span>Status</span><select id="profileStatusInput"><option value="active">Active</option><option value="paused">Paused</option><option value="finished">Finished</option><option value="archived">Archived</option></select></label>
        <label><span>Accent note</span><input id="profileTagInput" type="text" placeholder="modded, solo, hardcore..." /></label>
      </div>
      <div class="modal-actions"><button type="button" class="secondary-btn" data-close="profileModal">Cancel</button><button type="submit" class="primary-btn">Save Profile</button></div>
    </form>
  </dialog>

  <dialog id="moduleModal" class="modal wide">
    <form id="moduleForm" class="modal-card">
      <div class="modal-head"><div><div class="eyebrow">Module Forge</div><h3 id="moduleModalTitle">Add Module</h3></div><button type="button" class="icon-btn" data-close="moduleModal">✕</button></div>
      <input id="moduleEditId" type="hidden" />
      <input id="moduleProfileId" type="hidden" />
      <div class="form-grid two">
        <label><span>Title</span><input id="moduleTitleInput" type="text" required /></label>
        <label><span>Type</span>
          <select id="moduleTypeInput">
            <option value="notes">Notes</option>
            <option value="checklist">Checklist</option>
            <option value="custom">Custom Fields</option>
            <option value="table">Custom Table</option>
          </select>
        </label>
      </div>
      <label><span>Icon</span><input id="moduleIconInput" type="text" placeholder="📜" maxlength="4" /></label>

      <section id="customFieldBuilderSection" class="builder-section hidden">
        <div class="builder-head">
          <div>
            <div class="eyebrow">Custom Fields</div>
            <strong>Build your own fields</strong>
          </div>
          <button id="addFieldBtn" type="button" class="secondary-btn">+ Add Field</button>
        </div>
        <div id="fieldBuilderList" class="builder-list"></div>
      </section>

      <section id="tableBuilderSection" class="builder-section hidden">
        <div class="builder-head">
          <div>
            <div class="eyebrow">Custom Table</div>
            <strong>Define columns</strong>
          </div>
          <button id="addColumnBtn" type="button" class="secondary-btn">+ Add Column</button>
        </div>
        <div id="columnBuilderList" class="builder-list"></div>
      </section>

      <div class="modal-actions"><button type="button" class="secondary-btn" data-close="moduleModal">Cancel</button><button type="submit" class="primary-btn">Save Module</button></div>
    </form>
  </dialog>

  <dialog id="entryModal" class="modal">
    <form id="entryForm" class="modal-card">
      <div class="modal-head"><div><div class="eyebrow">Entry</div><h3 id="entryModalTitle">Add Entry</h3></div><button type="button" class="icon-btn" data-close="entryModal">✕</button></div>
      <input id="entryEditId" type="hidden" />
      <input id="entryModuleId" type="hidden" />
      <label><span>Title</span><input id="entryTitleInput" type="text" required /></label>
      <label><span>Details</span><textarea id="entryContentInput" rows="5"></textarea></label>
      <div class="modal-actions"><button type="button" class="secondary-btn" data-close="entryModal">Cancel</button><button type="submit" class="primary-btn">Save Entry</button></div>
    </form>
  </dialog>

  <dialog id="tableRowModal" class="modal wide">
    <form id="tableRowForm" class="modal-card">
      <div class="modal-head"><div><div class="eyebrow">Table Row</div><h3 id="tableRowTitle">Add Row</h3></div><button type="button" class="icon-btn" data-close="tableRowModal">✕</button></div>
      <input id="tableRowEditId" type="hidden" />
      <input id="tableRowModuleId" type="hidden" />
      <div id="tableRowFields" class="builder-list"></div>
      <div class="modal-actions"><button type="button" class="secondary-btn" data-close="tableRowModal">Cancel</button><button type="submit" class="primary-btn">Save Row</button></div>
    </form>
  </dialog>

  <script src="js/app.js"></script>
</body>
</html>
