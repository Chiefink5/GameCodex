<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Game Codex</title>
  <meta name="theme-color" content="#16121f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="scrim" class="scrim"></div>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand">👑 <span>Game Codex</span></div>
      <nav class="nav">
        <button class="nav-btn" data-route="home">🏠 Home</button>
        <button class="nav-btn" data-route="archive">🗃 Archive</button>
        <button class="nav-btn" data-route="presets">🧩 Presets</button>
        <button class="nav-btn" data-route="settings">🎨 Theme</button>
      </nav>
      <div class="sidebar-section">
        <div class="section-head">
          <span>Categories</span>
          <button id="addCategoryBtn" class="mini">+ Add</button>
        </div>
        <div id="categoryList" class="stack"></div>
      </div>
      <div class="sidebar-foot">Everything saves locally in your browser.</div>
    </aside>
    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn">☰</button>
        <div class="topbar-title">Game Codex</div>
        <div class="topbar-actions">
          <button id="addGameBtn" class="gold-btn">+ Game</button>
          <button id="exportBtn" class="icon-btn">⬇</button>
          <label class="icon-btn upload-btn">⬆<input id="importInput" type="file" accept=".json" hidden /></label>
        </div>
      </header>
      <section id="view" class="view"></section>
    </main>
  </div>
  <dialog id="modal" class="modal"></dialog>
  <script src="js/app.js"></script>
</body>
</html>
