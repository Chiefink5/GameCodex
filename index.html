<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Game Codex</title>
  <meta name="theme-color" content="#120f18" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="bootError" class="boot-error hidden"></div>
  <div id="scrim" class="scrim"></div>

  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="brand-mark">👑</div>
        <div>
          <div class="eyebrow">Royal Game Archive</div>
          <div class="brand-title">Game Codex</div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn" data-route="home">🏠 Home</button>
        <button class="nav-btn" data-route="archive">🗃 Archive</button>
        <button class="nav-btn" data-route="presets">🧩 Presets</button>
        <button class="nav-btn" data-route="settings">🎨 Theme</button>
      </nav>

      <section class="sidebar-section">
        <div class="section-head">
          <span>Categories</span>
          <button id="addCategoryBtn" class="mini-btn">+ Add</button>
        </div>
        <div id="categoryList" class="category-list"></div>
      </section>

      <div class="sidebar-foot">IndexedDB storage with migration from older local saves.</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="menuBtn" class="icon-btn">☰</button>
          <div>
            <div class="eyebrow">Game planning, worlds, runs, servers</div>
            <div class="topbar-title">Game Codex</div>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="addGameBtn" class="gold-btn">+ Game</button>
          <button id="exportBtn" class="icon-btn">⬇</button>
          <label class="icon-btn file-btn">⬆
            <input id="importInput" type="file" accept=".json" hidden />
          </label>
        </div>
      </header>

      <section id="view" class="view"></section>
    </main>
  </div>

  <dialog id="modal" class="modal"></dialog>

  <script src="js/utils.js?v=12-5"></script>
  <script src="js/storage.js?v=12-5"></script>
  <script src="js/modules.js?v=12-5"></script>
  <script src="js/ui.js?v=12-5"></script>
  <script src="js/app.js?v=12-5"></script>
</body>
</html>
